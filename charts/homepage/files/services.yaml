- Suivi Trello:
    - Board - Projet Annuel M2 IW:
        icon: si-trello
        href: https://trello.com/b/hSkOxAgf/projet-annuel-m2-iw
        description: "Vue d'ensemble du board Trello"
        widget:
          type: customapi
          url: https://api.trello.com/1/boards/69a4428cc7bc6635ffc7f719?key={{HOMEPAGE_VAR_TRELLO_KEY}}&token={{HOMEPAGE_VAR_TRELLO_TOKEN}}&fields=name,dateLastActivity
          refreshInterval: 60000
          display: list
          mappings:
            - field: name
              label: Nom
            - field: dateLastActivity
              label: Derniere activite
              format: relativeDate

    - Cartes ouvertes:
        icon: si-trello
        href: https://trello.com/b/hSkOxAgf/projet-annuel-m2-iw
        description: "Total cartes actives sur le board"
        widget:
          type: customapi
          url: https://api.trello.com/1/boards/69a4428cc7bc6635ffc7f719/cards?key={{HOMEPAGE_VAR_TRELLO_KEY}}&token={{HOMEPAGE_VAR_TRELLO_TOKEN}}&fields=id
          refreshInterval: 60000
          display: list
          mappings:
            - field: length
              label: Cartes
              format: number

    - Listes du board:
        icon: si-trello
        href: https://trello.com/b/hSkOxAgf/projet-annuel-m2-iw
        description: "Nombre de listes (colonnes)"
        widget:
          type: customapi
          url: https://api.trello.com/1/boards/69a4428cc7bc6635ffc7f719/lists?key={{HOMEPAGE_VAR_TRELLO_KEY}}&token={{HOMEPAGE_VAR_TRELLO_TOKEN}}&fields=name
          refreshInterval: 300000
          display: list
          mappings:
            - field: length
              label: Listes
              format: number

    - Derniere carte:
        icon: si-trello
        href: https://trello.com/b/hSkOxAgf/projet-annuel-m2-iw
        description: "Carte la plus recemment modifiee"
        widget:
          type: customapi
          url: https://api.trello.com/1/boards/69a4428cc7bc6635ffc7f719/cards?key={{HOMEPAGE_VAR_TRELLO_KEY}}&token={{HOMEPAGE_VAR_TRELLO_TOKEN}}&fields=name,dateLastActivity&limit=1&sort=-dateLastActivity
          refreshInterval: 60000
          display: list
          mappings:
            - field:
                "0": name
              label: Carte
            - field:
                "0": dateLastActivity
              label: Modifiee
              format: relativeDate

