image:
  repository: ghcr.io/gethomepage/homepage
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    path: /api/healthcheck
    port: 3000
    host: homepage.local
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /api/healthcheck
    port: 3000
    host: homepage.local
    initialDelaySeconds: 5
    periodSeconds: 10

service:
  type: ClusterIP
  port: 3000
  sessionAffinity:
    enabled: true
    timeoutSeconds: 3600

ingress:
  enabled: true
  className: nginx
  host: homepage.local
  path: /
  pathType: Prefix

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

secret:
  allowedHosts: "homepage.local,localhost,127.0.0.1"

github:
  enabled: false
  token: ""

trello:
  enabled: false
  key: ""
  token: ""
