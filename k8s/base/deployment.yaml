apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: homepage
            - secretRef:
                name: homepage-github-token    # HOMEPAGE_VAR_GITHUB_TOKEN
            - secretRef:
                name: homepage-trello          # HOMEPAGE_VAR_TRELLO_KEY + HOMEPAGE_VAR_TRELLO_TOKEN
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
              httpHeaders:
                - name: Host
                  value: homepage.local
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
              httpHeaders:
                - name: Host
                  value: homepage.local
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: settings-config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
            - name: services-config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
            - name: widgets-config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
            - name: bookmarks-config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
            - name: kubernetes-config
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
            - name: custom-config
              mountPath: /app/config/custom.css
              subPath: custom.css
      volumes:
        - name: settings-config
          configMap:
            name: homepage-settings
        - name: services-config
          configMap:
            name: homepage-services
        - name: widgets-config
          configMap:
            name: homepage-widgets
        - name: bookmarks-config
          configMap:
            name: homepage-bookmarks
        - name: kubernetes-config
          configMap:
            name: homepage-kubernetes
        - name: custom-config
          configMap:
            name: homepage-custom