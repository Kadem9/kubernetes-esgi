apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-widgets
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  widgets.yaml: |
    - search:
        provider: google
        target: _blank

    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
    
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "Cluster"

        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true